version: '3.7'

services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/etc/ssl/certs/aspnetcore-localhost-1FAA1A3C85393F717419416A10C6E8E1457C75F8.pfx
    build:
      context: .
      dockerfile: MyBuyingList/Dockerfile
    volumes:
        # MacOS default configuration: these volume mappings expect MacOS user secret and HTTPS certificate locations.
        - ~/.aspnet/dev-certs/https:/etc/ssl/certs
        # For Windows, comment out the two MacOS lines above and uncomment the two lines below (or configure equivalent environment variables):
        #      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
        #      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
        # Since no need for Swarm mode in development, we can use local folder for secrets
        - ./MyBuyingList/local/secrets/:/run/secrets/
    depends_on:
      - db
      - seq
    networks:
      - db-network

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    networks:
      - db-network

  db_admin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    networks:
      - db-network

  seq:
    networks:
      - db-network
     
networks:
  db-network:
    driver: bridge
    
volumes:
  postgres_data: