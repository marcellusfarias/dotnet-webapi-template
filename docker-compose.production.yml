version: '3.7'

# This is a production-ready docker compose file.
# It's intended to be used in Docker Swarm mode.
services:
  api:
    image: ghcr.io/marcellusfarias/dotnet-webapi-template:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/fullchain.pem
      - ASPNETCORE_Kestrel__Certificates__Default__KeyPath=/https/privkey.pem
    volumes:
      - /etc/letsencrypt/live/${APPLICATION_DOMAIN}:/https:ro
    secrets:
      - JwtSettings__SigningKey
      - ConnectionStrings__DefaultConnection
      - AdminSettings__Password
      - AdminSettings__Email
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        order: stop-first
      
secrets:
  JwtSettings__SigningKey:
    external: true
  ConnectionStrings__DefaultConnection:
    external: true
  AdminSettings__Password:
    external: true
  AdminSettings__Email:
    external: true